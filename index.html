<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1400px;
    min-height:90vh;
    display:flex;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 25px 50px rgba(0,0,0,.2);
}

.sidebar{
    width:260px;
    background:rgba(0,0,0,0.2);
    color:white;
    padding:30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:40px;
}

.nav{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.nav a{
    text-decoration:none;
    color:white;
    padding:15px;
    border-radius:12px;
    transition:.3s;
}

.nav a:hover{
    background:rgba(255,255,255,.15);
}

.main{
    flex:1;
    padding:30px;
    color:white;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    width:300px;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
    background:white;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,.12);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    opacity:.8;
    margin-bottom:10px;
}

.card h1{
    font-size:32px;
}

.content{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

.panel{
    background:rgba(255,255,255,.12);
    border-radius:20px;
    padding:25px;
}

.task{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(255,255,255,.08);
    margin-top:10px;
    border-radius:12px;
}

.progress{
    margin-top:20px;
}

.progress-item{
    margin-bottom:20px;
}

.progress-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.bar{
    height:10px;
    background:rgba(255,255,255,.15);
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:white;
}

.toggle{
    cursor:pointer;
    background:white;
    color:#333;
    border:none;
    padding:10px 18px;
    border-radius:10px;
}

.dark{
    background:#111827;
}

.dark .container{
    background:rgba(17,24,39,.95);
}

.dark .sidebar{
    background:#0f172a;
}

.dark .card,
.dark .panel{
    background:#1e293b;
}

@media(max-width:900px){
    .content{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .search{
        width:180px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">FocusPro</div>

        <div class="nav">
            <a href="#">🏠 Dashboard</a>
            <a href="#">📊 Analytics</a>
            <a href="#">📁 Projects</a>
            <a href="#">✅ Tasks</a>
            <a href="#">📅 Calendar</a>
            <a href="#">⚙ Settings</a>
        </div>
    </div>

    <div class="main">

        <div class="topbar">
            <input class="search" placeholder="Search...">

            <div class="profile">
                <button class="toggle" onclick="toggleTheme()">🌙 Theme</button>
                <div class="avatar"></div>
            </div>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Total Tasks</h3>
                <h1>124</h1>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <h1>87</h1>
            </div>

            <div class="card">
                <h3>Focus Hours</h3>
                <h1>53</h1>
            </div>

            <div class="card">
                <h3>Projects</h3>
                <h1>12</h1>
            </div>

        </div>

        <div class="content">

            <div class="panel">

                <h2>Today's Tasks</h2>

                <div class="task">
                    <span>Design Landing Page</span>
                    <span>90%</span>
                </div>

                <div class="task">
                    <span>Client Meeting</span>
                    <span>Completed</span>
                </div>

                <div class="task">
                    <span>Mobile App UI</span>
                    <span>60%</span>
                </div>

                <div class="task">
                    <span>Project Deployment</span>
                    <span>Pending</span>
                </div>

            </div>

            <div class="panel">

                <h2>Progress</h2>

                <div class="progress">

                    <div class="progress-item">
                        <div class="progress-header">
                            <span>UI Design</span>
                            <span>85%</span>
                        </div>
                        <div class="bar">
                            <div class="fill" style="width:85%"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-header">
                            <span>Frontend</span>
                            <span>70%</span>
                        </div>
                        <div class="bar">
                            <div class="fill" style="width:70%"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-header">
                            <span>Backend</span>
                            <span>55%</span>
                        </div>
                        <div class="bar">
                            <div class="fill" style="width:55%"></div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
function toggleTheme(){
    document.body.classList.toggle('dark');
}
</script>

</body>
</html>
